# Grant Scanner — Configuration
#
# The grant scanner is implemented as Claude Code skills (/scan-grants, /check-grant).
# No runtime configuration is needed — the skills read project files directly.
#
# Command definitions: .claude/commands/scan-grants.md
#                      .claude/commands/check-grant.md
# Source registry:   bot/sources.yaml
# Full spec:         GRANT_SCANNER_CLI_SPEC.md
# Matching logic:    BOT_MATCHING_SPEC.md
#
# Evaluation parameters (embedded in command definitions):
#   - Composite inclusion: at least one module >= 2, confidence MEDIUM or HIGH
#   - Modules: MOD-FAIR-TRAIN, MOD-IMG-SERVERS, MOD-AI-PIPELINES, MOD-THEORY-AI, MOD-MULTIMODAL-BIOMARKERS
#   - Tracks: A (institutional enablement), B (PI-anchored science)
